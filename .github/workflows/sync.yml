name: Daily Data Sync

on:
  schedule:
    - cron: "0 4,10,16,22 * * *"  # 06:00, 12:00, 18:00, 00:00 SAST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-garmin:
    name: Garmin Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Restore Garmin tokens
        run: |
          mkdir -p ~/.garminconnect
          echo "${{ secrets.GARMIN_TOKENS_BASE64 }}" | base64 -d | tar -xzf - -C ~/

      - name: Run Garmin sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: python scripts/sync_garmin.py

  sync-strava:
    name: Strava Sync
    runs-on: ubuntu-latest
    permissions:
      secrets: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Strava sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/sync_strava.py

  sync-zepp:
    name: Zepp Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements_zepp.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements_zepp.txt

      - name: Run Zepp sync
        env:
          ZEPP_APP_TOKEN: ${{ secrets.ZEPP_APP_TOKEN }}
          ZEPP_USER_ID: ${{ secrets.ZEPP_USER_ID }}
          ZEPP_REGION: ${{ secrets.ZEPP_REGION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: python scripts/sync_zepp.py
